# Alembic 配置文件
# 剧本杀 EvoMurder 项目数据库迁移配置

[alembic]
# 迁移脚本路径
script_location = api/db/migrations

# 迁移文件模板
# file_template = %%(rev)s_%%(slug)s

# sys.path 设置，确保能导入项目模块
prepend_sys_path = .

# 时区设置（使用 UTC）
# timezone =

# 迁移文件名最大长度
# max_length = 40

# 截断 slug 的最大长度
# truncate_slug_length = 40

# 运行环境
# version_path_separator = os  # 默认值，使用 os.sep

# sqlalchemy 连接 URL（会在 env.py 中动态覆盖）
sqlalchemy.url = sqlite:///data/murder_mystery.db


[post_write_hooks]
# 钩子配置（可选）
# 用于在生成迁移脚本后执行格式化等操作


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
